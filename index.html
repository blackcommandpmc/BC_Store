<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Store</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔫</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-image: url('https://i.postimg.cc/LXdvgLxk/black-command.png');
            --gold: #d4af37;
            --bright-red: #ff0000;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--bg-image) no-repeat center center fixed;
            background-size: cover; color: white;
            display: flex; flex-direction: column; align-items: center;
        }

        .hidden { display: none !important; }

        /* LOADER */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #333;
            border-top: 4px solid var(--gold); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* TOP BAR FIXA */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            z-index: 900; padding: 0 20px; box-sizing: border-box;
        }
        .top-bar h1 {
            color: var(--gold); font-size: 1.6em; text-transform: uppercase;
            letter-spacing: 3px; text-shadow: 2px 2px 4px var(--bright-red);
            margin: 0; font-weight: 900;
        }
        .search-container { position: absolute; right: 20px; width: 220px; }
        #search-input { 
            background: rgba(255,255,255,0.1); border: 1px solid var(--gold); 
            padding: 8px; color: white; border-radius: 5px; width: 100%;
        }

        /* AUTH & MODALS */
        #auth-screen { height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); }
        .auth-card, .modal { background: rgba(0,0,0,0.95); padding: 25px; border-radius: 12px; border: 1px solid var(--gold); width: 340px; text-align: center; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }

        /* STORE LAYOUT */
        #store-screen { width: 100%; max-width: 1100px; padding: 100px 20px 20px 20px; box-sizing: border-box; }
        
        #admin-top-bar { position: fixed; top: 85px; right: 20px; z-index: 800; }
        .btn-admin-add { background: var(--gold); color: black; padding: 8px 15px; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; }

        .category-section { 
            margin-bottom: 50px; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(10px); 
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; box-sizing: border-box;
        }
        .category-title { color: var(--gold); text-transform: uppercase; font-size: 1.8em; margin: 0 0 20px 0; text-align: center; text-shadow: 3px 3px 5px var(--bright-red); font-weight: 900; }

        .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; }
        @media (max-width: 850px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { 
            .product-grid { grid-template-columns: 1fr; } 
            .top-bar h1 { font-size: 1.1em; } 
            .search-container { width: 120px; } 
        }

        .product-card { background: rgba(255,255,255,0.08); padding: 12px; border-radius: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .product-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 4px; }

        .info-prices { display: flex; background: rgba(0,0,0,0.4); border-radius: 5px; margin: 10px 0; padding: 8px; justify-content: space-around; }
        .p-lab { font-size: 0.6em; opacity: 0.8; display: block; text-transform: uppercase; }
        .p-val { font-weight: 900; font-size: 1.1em; }

        .cart-panel { background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); padding: 15px; position: fixed; bottom: 0; right: 20px; width: 300px; border-radius: 10px 10px 0 0; z-index: 500; font-size: 0.85em; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #444; background: rgba(255,255,255,0.1); color: white; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <div id="loader" class="hidden"><div class="spinner"></div></div>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="color:var(--gold)">BEM-VINDO</h2>
            <input type="text" id="login-user" placeholder="Usuário">
            <input type="password" id="login-pass" placeholder="Senha" onkeypress="if(event.key==='Enter') login()">
            <button onclick="login()" style="background:var(--gold); color:black">ENTRAR</button>
            <button style="background:#2980b9" onclick="toggleModal('reg-modal', true)">CRIAR CONTA</button>
        </div>
    </div>

    <div id="reg-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3 style="color:var(--gold)">Novo Cadastro</h3>
            <input type="text" id="reg-bot-check" style="display:none">
            <input type="text" id="reg-nome" placeholder="Usuário">
            <input type="text" id="reg-tel" placeholder="Telefone">
            <input type="password" id="reg-pass" placeholder="Senha">
            <button onclick="register()" style="background:#27ae60">FINALIZAR</button>
            <button onclick="toggleModal('reg-modal', false)" style="background:#c0392b">CANCELAR</button>
        </div>
    </div>

    <div id="store-screen" class="hidden">
        <div class="top-bar">
            <h1>Encomenda de Armas</h1>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="🔍 Buscar..." oninput="filterProducts()">
            </div>
        </div>

        <div id="admin-top-bar" class="hidden">
            <button class="btn-admin-add" onclick="openAddModal()">➕ NOVO ITEM</button>
        </div>

        <div id="store-view"></div>
        <div style="height: 120px;"></div>

        <div class="cart-panel">
            <h4 style="margin:0 0 10px 0; color:var(--gold)">🛒 CARRINHO</h4>
            <div id="cart-items" style="max-height: 150px; overflow-y: auto;"></div>
            <h4 id="cart-total" style="margin: 10px 0; border-top: 1px solid #444; padding-top: 10px;">Itens no Carrinho</h4>
            <button onclick="checkout()" style="background:#27ae60">ENVIAR ENCOMENDA</button>
            <button onclick="location.reload()" style="background:#c0392b; margin-top:5px; font-size: 0.8em;">SAIR</button>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3 id="admin-title" style="color:var(--gold)">Gerenciar Item</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="p-name" placeholder="Nome">
            <input type="number" id="p-price-pista" placeholder="Preço Pista ($)">
            <input type="number" id="p-price-partner" placeholder="Preço Parceria ($)">
            <input type="text" id="p-img" placeholder="URL Imagem">
            <select id="p-cat">
                <option value="Pistolas">Pistolas</option>
                <option value="Submetralhadoras">Submetralhadoras</option>
                <option value="Fuzis">Fuzis</option>
                <option value="Especiais">Especiais</option>
            </select>
            <button onclick="saveProduct()" style="background:var(--gold); color:black">SALVAR</button>
            <button onclick="toggleModal('admin-modal', false)" style="background:#c0392b">FECHAR</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pvwogvjmcfqbqulbwpdm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Fhl1kcLddx4TjiHqJwWvrg_r6nbMq0f';
        const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1480276662615802033/QpfNdcbcmapSjgbIiayUOtuhqZOfqijMoiGBtkUIP7k-v--YO5kEDByEbRZiXRxzL8M7';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let cart = [];
        let currentUser = null;

        function showLoading(s) { document.getElementById('loader').classList.toggle('hidden', !s); }
        function toggleModal(id, s) { document.getElementById(id).classList.toggle('hidden', !s); }

        async function login() {
            showLoading(true);
            const user = document.getElementById('login-user').value.trim().toLowerCase();
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email: `${user}@loja.com`, password: document.getElementById('login-pass').value });
            showLoading(false);
            if (error) alert("Dados inválidos."); else { currentUser = data.user; initStore(); }
        }

        async function register() {
            showLoading(true);
            const user = document.getElementById('reg-nome').value.trim().toLowerCase();
            const { error } = await supabaseClient.auth.signUp({ 
                email: `${user}@loja.com`, password: document.getElementById('reg-pass').value,
                options: { data: { nome_ingame: document.getElementById('reg-nome').value, tel_ingame: document.getElementById('reg-tel').value, role: 'customer' } }
            });
            showLoading(false);
            if (error) alert(error.message); else { alert("Sucesso! Faça Login."); toggleModal('reg-modal', false); }
        }

        function initStore() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('store-screen').classList.remove('hidden');
            if (currentUser.user_metadata.role === 'admin') document.getElementById('admin-top-bar').classList.remove('hidden');
            loadProducts();
        }

        async function loadProducts() {
            showLoading(true);
            const { data: products } = await supabaseClient.from('products').select('*');
            const view = document.getElementById('store-view');
            view.innerHTML = '';
            ["Pistolas", "Submetralhadoras", "Fuzis", "Especiais"].forEach(cat => {
                const items = products?.filter(p => p.category === cat) || [];
                if (items.length > 0) {
                    let html = `<div class="category-section"><h2 class="category-title">${cat}</h2><div class="product-grid">`;
                    items.forEach(p => {
                        // FIX: Ensure we use the exact column names from your DB
                        const pista = p.price_pista || 0;
                        const partner = p.price_partner || 0;
                        html += `
                            <div class="product-card">
                                <img src="${p.image_url}">
                                <h4>${p.name}</h4>
                                <div class="info-prices">
                                    <div><span class="p-lab">PISTA</span><span class="p-val">$${pista}</span></div>
                                    <div><span class="p-lab" style="color:var(--gold)">PARC.</span><span class="p-val" style="color:var(--gold)">$${partner}</span></div>
                                </div>
                                <button onclick="addToCart('${p.name}', ${pista}, ${partner})" style="background:#27ae60">ADICIONAR</button>
                                ${currentUser.user_metadata.role === 'admin' ? `
                                    <div style="display:flex; gap:5px; margin-top:8px">
                                        <button onclick="editProduct('${p.id}','${p.name}',${pista},${partner},'${p.image_url}','${p.category}')" style="background:#f39c12; font-size:0.65em">EDITAR</button>
                                        <button onclick="deleteProduct('${p.id}')" style="background:#c0392b; font-size:0.65em">EXCLUIR</button>
                                    </div>
                                ` : ''}
                            </div>`;
                    });
                    view.innerHTML += html + `</div></div>`;
                }
            });
            showLoading(false);
        }

        function filterProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(card => {
                const name = card.querySelector('h4').innerText.toLowerCase();
                card.style.display = name.includes(term) ? "block" : "none";
            });
        }

        function addToCart(name, pista, parc) {
            const item = cart.find(i => i.name === name);
            if (item) item.qty++; else cart.push({ name, pista, parc, qty: 1 });
            updateCart();
        }

        function updateCart() {
            const div = document.getElementById('cart-items');
            div.innerHTML = '';
            cart.forEach(i => {
                div.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid #333;">
                    <span>${i.qty}x ${i.name}</span>
                    <button onclick="removeFromCart('${i.name}')" style="width:auto; background:none; color:#ff4d4d; font-weight:bold">X</button>
                </div>`;
            });
        }

        function removeFromCart(n) {
            const idx = cart.findIndex(i => i.name === n);
            if (idx !== -1) { if (cart[idx].qty > 1) cart[idx].qty--; else cart.splice(idx, 1); }
            updateCart();
        }

        async function checkout() {
            if (cart.length === 0) return alert("Vazio!");
            showLoading(true);
            const list = cart.map(i => `• ${i.qty}x **${i.name}**\n  - Pista: $${i.pista*i.qty} | Parc: $${i.parc*i.qty}`).join('\n\n');
            await fetch(DISCORD_WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({
                embeds: [{ title: "🚨 ENCOMENDA", color: 16711680, fields: [{name:"Cliente", value:currentUser.user_metadata.nome_ingame, inline:true}, {name:"Pedido", value:list}] }]
            })});
            alert("Pedido recebido! Entraremos em contato dentro da cidade.");
            cart = []; updateCart(); showLoading(false);
        }

        function openAddModal() {
            document.getElementById('edit-id').value = '';
            document.getElementById('p-name').value = '';
            document.getElementById('p-price-pista').value = '';
            document.getElementById('p-price-partner').value = '';
            document.getElementById('p-img').value = '';
            document.getElementById('admin-title').innerText = "Novo Item";
            toggleModal('admin-modal', true);
        }

        async function saveProduct() {
            showLoading(true);
            const id = document.getElementById('edit-id').value;
            const item = { 
                name: document.getElementById('p-name').value, 
                price_pista: parseFloat(document.getElementById('p-price-pista').value),
                price_partner: parseFloat(document.getElementById('p-price-partner').value),
                image_url: document.getElementById('p-img').value, 
                category: document.getElementById('p-cat').value 
            };
            if (id) await supabaseClient.from('products').update(item).eq('id', id);
            else await supabaseClient.from('products').insert([item]);
            showLoading(false); toggleModal('admin-modal', false); loadProducts();
        }

        function editProduct(id, name, pista, partner, img, cat) {
            document.getElementById('edit-id').value = id;
            document.getElementById('p-name').value = name;
            document.getElementById('p-price-pista').value = pista;
            document.getElementById('p-price-partner').value = partner;
            document.getElementById('p-img').value = img;
            document.getElementById('p-cat').value = cat;
            document.getElementById('admin-title').innerText = "Editar Item";
            toggleModal('admin-modal', true);
        }

        async function deleteProduct(id) { if(confirm("Excluir?")) { await supabaseClient.from('products').delete().eq('id', id); loadProducts(); } }
    </script>
</body>
</html>
