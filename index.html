<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-image: url('https://i.postimg.cc/Xq3sBsGY/image.png');
        }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--bg-image) no-repeat center center fixed;
            background-size: cover; color: white;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 1);
        }
        .hidden { display: none !important; }

        /* LOADING SPINNER */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid #27ae60; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* AUTH & MODALS */
        #auth-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.6); }
        .auth-card, .modal { background: rgba(0,0,0,0.95); padding: 20px; border-radius: 8px; border: 1px solid #444; width: 280px; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }

        /* COMPACT STORE LAYOUT */
        #store-screen { display: grid; grid-template-columns: 1fr 260px; height: 100vh; }
        .main-content { overflow-y: auto; padding: 15px; }
        .cart-panel { background: rgba(0,0,0,0.92); border-left: 1px solid #444; padding: 15px; display: flex; flex-direction: column; font-size: 0.85em; }

        .category-section { margin-bottom: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px; }
        .category-title { color: #f1c40f; text-transform: uppercase; font-size: 1em; margin: 10px 0; }
        
        /* SMALLER PRODUCT GRID */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .product-card { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(5px); 
            padding: 8px; border-radius: 6px; text-align: center; border: 1px solid #333;
        }
        .product-card img { width: 100%; height: 80px; object-fit: cover; border-radius: 3px; }
        .product-card h4 { margin: 5px 0 2px 0; font-size: 0.8em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .product-card p { margin: 0 0 5px 0; color: #2ecc71; font-weight: bold; font-size: 0.85em; }

        /* INPUTS & BUTTONS */
        input, select, button { width: 100%; padding: 8px; margin: 4px 0; border-radius: 3px; border: 1px solid #444; background: rgba(255,255,255,0.1); color: white; box-sizing: border-box; font-size: 0.85em; }
        button { cursor: pointer; background: #27ae60; border: none; font-weight: bold; }
        .btn-edit { background: #f39c12; font-size: 0.75em; }
        .btn-del { background: #c0392b; font-size: 0.75em; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div id="loader" class="hidden">
        <div class="spinner"></div>
        <p>Processando...</p>
    </div>

    <div id="auth-screen">
        <div class="auth-card">
            <h3>LOGIN</h3>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button onclick="login()">ENTRAR</button>
            <button style="background:#2980b9" onclick="toggleModal('reg-modal', true)">REGISTRAR</button>
        </div>
    </div>

    <div id="reg-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3>Nova Conta</h3>
            <input type="text" id="reg-nome" placeholder="Nome in-game">
            <input type="text" id="reg-tel" placeholder="Telefone in-game">
            <input type="email" id="reg-email" placeholder="E-mail">
            <input type="password" id="reg-pass" placeholder="Senha">
            <button onclick="register()">CRIAR</button>
            <button class="btn-del" onclick="toggleModal('reg-modal', false)">FECHAR</button>
        </div>
    </div>

    <div id="store-screen" class="hidden">
        <div class="main-content">
            <div id="admin-panel" class="hidden" style="background: rgba(0,0,0,0.8); padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 0.8em;">
                <h4 id="admin-title" style="margin-top:0">Painel Admin</h4>
                <input type="hidden" id="edit-id">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <input type="text" id="p-name" placeholder="Nome">
                    <input type="number" id="p-price" placeholder="Preço">
                    <input type="text" id="p-img" placeholder="URL Imagem">
                    <select id="p-cat">
                        <option>Pistolas</option>
                        <option>Submetralhadoras</option>
                        <option>Fuzis</option>
                        <option>Especiais</option>
                    </select>
                </div>
                <button onclick="saveProduct()">SALVAR ITEM</button>
                <button id="cancel-edit" class="hidden btn-del" onclick="resetAdminForm()">CANCELAR</button>
            </div>
            <div id="store-view"></div>
        </div>

        <div class="cart-panel">
            <h4 style="margin-top:0">Carrinho</h4>
            <div id="cart-items" style="flex-grow: 1;"></div>
            <div style="padding-top: 10px; border-top: 1px solid white;">
                <h4 id="cart-total" style="margin: 10px 0">Total: $0</h4>
                <button onclick="checkout()">PEDIR NO DISCORD</button>
                <button class="btn-del" onclick="logout()" style="margin-top:8px">SAIR</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://pvwogvjmcfqbqulbwpdm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Fhl1kcLddx4TjiHqJwWvrg_r6nbMq0f';
        const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1480276662615802033/QpfNdcbcmapSjgbIiayUOtuhqZOfqijMoiGBtkUIP7k-v--YO5kEDByEbRZiXRxzL8M7';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let cart = [];
        let currentUser = null;
        const categories = ["Pistolas", "Submetralhadoras", "Fuzis", "Especiais"];

        function showLoading(show) { document.getElementById('loader').classList.toggle('hidden', !show); }
        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        async function register() {
            showLoading(true);
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;
            const metadata = { nome_ingame: document.getElementById('reg-nome').value, tel_ingame: document.getElementById('reg-tel').value, role: 'customer' };
            const { error } = await supabaseClient.auth.signUp({ email, password, options: { data: metadata } });
            showLoading(false);
            if (error) alert(error.message); else { alert("Sucesso! Logue agora."); toggleModal('reg-modal', false); }
        }

        async function login() {
            showLoading(true);
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            showLoading(false);
            if (error) alert(error.message); else { currentUser = data.user; initStore(); }
        }

        function initStore() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('store-screen').classList.remove('hidden');
            if (currentUser.user_metadata.role === 'admin') document.getElementById('admin-panel').classList.remove('hidden');
            loadProducts();
        }

        async function loadProducts() {
            showLoading(true);
            const { data: products } = await supabaseClient.from('products').select('*');
            const view = document.getElementById('store-view');
            view.innerHTML = '';
            categories.forEach(cat => {
                const catItems = products?.filter(p => p.category === cat) || [];
                if (catItems.length > 0) {
                    let section = `<div class="category-section"><h4 class="category-title">${cat}</h4><div class="product-grid">`;
                    catItems.forEach(p => {
                        section += `
                            <div class="product-card">
                                <img src="${p.image_url}">
                                <h4>${p.name}</h4>
                                <p>$${p.price}</p>
                                <button onclick="addToCart('${p.name}', ${p.price})">ADICIONAR</button>
                                ${currentUser.user_metadata.role === 'admin' ? `
                                    <button class="btn-edit" onclick="editProduct('${p.id}', '${p.name}', ${p.price}, '${p.image_url}', '${p.category}')">EDITAR</button>
                                    <button class="btn-del" onclick="deleteProduct('${p.id}')">EXCLUIR</button>
                                ` : ''}
                            </div>`;
                    });
                    section += `</div></div>`;
                    view.innerHTML += section;
                }
            });
            showLoading(false);
        }

        async function saveProduct() {
            showLoading(true);
            const id = document.getElementById('edit-id').value;
            const item = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                image_url: document.getElementById('p-img').value,
                category: document.getElementById('p-cat').value
            };
            let error;
            if (id) ({ error } = await supabaseClient.from('products').update(item).eq('id', id));
            else ({ error } = await supabaseClient.from('products').insert([item]));
            showLoading(false);
            if (error) alert(error.message); else { resetAdminForm(); loadProducts(); }
        }

        function editProduct(id, name, price, img, cat) {
            document.getElementById('edit-id').value = id;
            document.getElementById('p-name').value = name;
            document.getElementById('p-price').value = price;
            document.getElementById('p-img').value = img;
            document.getElementById('p-cat').value = cat;
            document.getElementById('admin-title').innerText = "Editando Item";
            document.getElementById('cancel-edit').classList.remove('hidden');
        }

        function resetAdminForm() {
            document.getElementById('edit-id').value = '';
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-img').value = '';
            document.getElementById('admin-title').innerText = "Novo Item";
            document.getElementById('cancel-edit').classList.add('hidden');
        }

        async function deleteProduct(id) {
            if(confirm("Excluir item?")) { 
                showLoading(true);
                await supabaseClient.from('products').delete().eq('id', id); 
                loadProducts(); 
            }
        }

        function addToCart(name, price) {
            const item = cart.find(i => i.name === name);
            if (item) item.qty++; else cart.push({ name, price, qty: 1 });
            updateCart();
        }

        function removeFromCart(name, all = false) {
            const index = cart.findIndex(i => i.name === name);
            if (index !== -1) {
                if (all || cart[index].qty <= 1) cart.splice(index, 1);
                else cart[index].qty--;
            }
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;
            cart.forEach(i => {
                total += i.price * i.qty;
                container.innerHTML += `
                    <div class="cart-item">
                        <span>${i.qty}x ${i.name}</span>
                        <div>
                            <button style="width:auto; padding:2px 6px" onclick="removeFromCart('${i.name}')">-</button>
                            <button style="width:auto; padding:2px 6px" class="btn-del" onclick="removeFromCart('${i.name}', true)">x</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = `Total: $${total}`;
        }

        async function checkout() {
            if (cart.length === 0) return alert("Vazio!");
            showLoading(true);
            const list = cart.map(i => `• ${i.qty}x ${i.name} ($${i.price * i.qty})`).join('\n');
            const total = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
            try {
                await fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: "🛒 NOVO PEDIDO", color: 3066993,
                            fields: [
                                { name: "Cliente", value: currentUser.user_metadata.nome_ingame, inline: true },
                                { name: "Tel", value: currentUser.user_metadata.tel_ingame, inline: true },
                                { name: "Itens", value: list },
                                { name: "Total", value: `$${total}` }
                            ]
                        }]
                    })
                });
                alert("Pedido Enviado!"); cart = []; updateCart();
            } catch(e) { alert("Erro ao enviar pedido."); }
            showLoading(false);
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
