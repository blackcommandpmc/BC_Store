<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-image: url('https://i.postimg.cc/LXdvgLxk/black-command.png');
            --gold: #d4af37;
            --bright-red: #ff0000;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--bg-image) no-repeat center center fixed;
            background-size: cover; color: white;
            display: flex; flex-direction: column; align-items: center;
        }

        .hidden { display: none !important; }

        /* LOADER */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #333;
            border-top: 4px solid var(--gold); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* AUTH & MODALS */
        #auth-screen { height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.6); }
        .auth-card, .modal { background: rgba(0,0,0,0.95); padding: 25px; border-radius: 12px; border: 1px solid var(--gold); width: 320px; text-align: center; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }

        /* DROPDOWN COLOR FIX */
        select option { color: black; background: white; }

        /* STORE LAYOUT */
        #store-screen { width: 100%; max-width: 1000px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        
        /* ADMIN TOP BUTTON */
        #admin-top-bar { position: fixed; top: 15px; right: 20px; z-index: 800; }
        .btn-admin-add { background: var(--gold); color: black; width: auto; padding: 8px 15px; border-radius: 50px; box-shadow: 0 0 10px rgba(212,175,55,0.5); }

        .category-section { 
            margin-bottom: 50px; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(10px); 
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; box-sizing: border-box;
        }

        .category-title { 
            color: var(--gold); text-transform: uppercase; font-size: 1.8em; margin: 0 0 20px 0; 
            text-align: center; text-shadow: 3px 3px 5px var(--bright-red); font-weight: 900; letter-spacing: 3px;
        }

        .product-grid { 
    display: grid; 
    /* This forces exactly 3 columns on larger screens, and scales down on mobile */
    grid-template-columns: repeat(3, 1fr); 
    gap: 20px; 
    justify-items: center;
    width: 100%;
}

/* Responsive adjustment for small phones */
@media (max-width: 600px) {
    .product-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

.product-card { 
    background: rgba(255,255,255,0.08); 
    padding: 12px; 
    border-radius: 8px; 
    text-align: center; 
    border: 1px solid rgba(255,255,255,0.1); 
    width: 100%; 
    /* Ensures cards don't get too giant on wide screens */
    max-width: 280px; 
    box-sizing: border-box;
}

.product-card img { 
    width: 100%; 
    height: 140px; /* Slightly taller images for the wider columns */
    object-fit: cover; 
    border-radius: 4px; 
}
        }
        .product-card img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; }
        .product-card h4 { margin: 8px 0 4px 0; font-size: 0.8em; }
        .product-card p { margin: 0 0 8px 0; color: #2ecc71; font-weight: bold; font-size: 0.85em; }

        .cart-panel { 
            background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); 
            padding: 15px; position: fixed; bottom: 0; right: 20px; 
            width: 280px; border-radius: 10px 10px 0 0; z-index: 500; font-size: 0.85em;
        }

        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #444; background: rgba(255,255,255,0.1); color: white; box-sizing: border-box; }
        button { cursor: pointer; background: #27ae60; border: none; font-weight: bold; }
        .btn-edit { background: #f39c12; font-size: 0.75em; }
        .btn-del { background: #c0392b; font-size: 0.75em; }
    </style>
</head>
<body>

    <div id="loader" class="hidden"><div class="spinner"></div><p>Processando...</p></div>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="color:var(--gold)">BEM-VINDO</h2>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha" onkeypress="if(event.key==='Enter') login()">
            <button onclick="login()">ENTRAR</button>
            <button style="background:#2980b9" onclick="toggleModal('reg-modal', true)">CRIAR CONTA</button>
        </div>
    </div>

    <div id="reg-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3 style="color:var(--gold)">Cadastro</h3>
            <input type="text" id="reg-nome" placeholder="Nome in-game">
            <input type="text" id="reg-tel" placeholder="Telefone in-game">
            <input type="email" id="reg-email" placeholder="E-mail">
            <input type="password" id="reg-pass" placeholder="Senha">
            <input type="text" id="reg-bot-check" style="display:none" tabindex="-1" autocomplete="off">
            <button onclick="register()">FINALIZAR</button>
            <button class="btn-del" onclick="toggleModal('reg-modal', false)">CANCELAR</button>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay hidden">
        <div class="modal" style="width: 400px;">
            <h3 id="admin-title" style="color:var(--gold)">Gerenciar Item</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="p-name" placeholder="Nome do Item">
            <input type="number" id="p-price" placeholder="Preço ($)" onkeypress="if(event.key==='Enter') saveProduct()">
            <input type="text" id="p-img" placeholder="Link da Foto">
            <select id="p-cat">
                <option value="Pistolas">Pistolas</option>
                <option value="Submetralhadoras">Submetralhadoras</option>
                <option value="Fuzis">Fuzis</option>
                <option value="Especiais">Especiais</option>
            </select>
            <button onclick="saveProduct()">SALVAR NO BANCO</button>
            <button class="btn-del" onclick="resetAdminForm(); toggleModal('admin-modal', false);">FECHAR</button>
        </div>
    </div>

    <div id="store-screen" class="hidden">
        <div id="admin-top-bar" class="hidden">
            <button class="btn-admin-add" onclick="toggleModal('admin-modal', true)">➕ NOVO ITEM</button>
        </div>

        <div class="main-content">
            <div id="store-view"></div>
            <div style="height: 100px;"></div>
        </div>

        <div class="cart-panel">
            <h4 style="margin:0 0 10px 0; color:var(--gold); display:flex; justify-content: space-between;">
                🛒 CARRINHO <span onclick="toggleCart()" style="cursor:pointer">➖</span>
            </h4>
            <div id="cart-items-box">
                <div id="cart-items" style="max-height: 150px; overflow-y: auto;"></div>
                <div style="padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2);">
                    <h4 id="cart-total" style="margin: 10px 0">Total: $0</h4>
                    <button onclick="checkout()">PEDIR VIA DISCORD</button>
                    <button class="btn-del" onclick="logout()" style="margin-top:8px">SAIR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pvwogvjmcfqbqulbwpdm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Fhl1kcLddx4TjiHqJwWvrg_r6nbMq0f';
        const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1480276662615802033/QpfNdcbcmapSjgbIiayUOtuhqZOfqijMoiGBtkUIP7k-v--YO5kEDByEbRZiXRxzL8M7';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let cart = [];
        let currentUser = null;
        const categories = ["Pistolas", "Submetralhadoras", "Fuzis", "Especiais"];

        function showLoading(show) { document.getElementById('loader').classList.toggle('hidden', !show); }
        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }
        function toggleCart() { document.getElementById('cart-items-box').classList.toggle('hidden'); }

       async function register() {
        // If the hidden field is filled, it's a bot
        if (document.getElementById('reg-bot-check').value !== "") {
        console.log("Bot detected.");
        return; // Exit silently
        }
           {
            showLoading(true);
            const metadata = { nome_ingame: document.getElementById('reg-nome').value, tel_ingame: document.getElementById('reg-tel').value, role: 'customer' };
            const { error } = await supabaseClient.auth.signUp({ 
                email: document.getElementById('reg-email').value, 
                password: document.getElementById('reg-pass').value, 
                options: { data: metadata } 
            });
            showLoading(false);
            if (error) alert(error.message); else { alert("Sucesso! Faça Login."); toggleModal('reg-modal', false); }
        }

        async function login() {
            showLoading(true);
            const { data, error } = await supabaseClient.auth.signInWithPassword({ 
                email: document.getElementById('login-email').value, 
                password: document.getElementById('login-pass').value 
            });
            showLoading(false);
            if (error) alert(error.message); else { currentUser = data.user; initStore(); }
        }

        function initStore() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('store-screen').classList.remove('hidden');
            if (currentUser.user_metadata.role === 'admin') document.getElementById('admin-top-bar').classList.remove('hidden');
            loadProducts();
        }

        async function loadProducts() {
            showLoading(true);
            const { data: products } = await supabaseClient.from('products').select('*');
            const view = document.getElementById('store-view');
            view.innerHTML = '';
            categories.forEach(cat => {
                const catItems = products?.filter(p => p.category === cat) || [];
                if (catItems.length > 0) {
                    let section = `<div class="category-section"><h2 class="category-title">${cat}</h2><div class="product-grid">`;
                    catItems.forEach(p => {
                        section += `
                            <div class="product-card">
                                <img src="${p.image_url}">
                                <h4>${p.name}</h4>
                                <p>$${p.price}</p>
                                <button onclick="addToCart('${p.name}', ${p.price})">ADD</button>
                                ${currentUser.user_metadata.role === 'admin' ? `
                                    <button class="btn-edit" onclick="editProduct('${p.id}', '${p.name}', ${p.price}, '${p.image_url}', '${p.category}')">EDT</button>
                                    <button class="btn-del" onclick="deleteProduct('${p.id}')">X</button>
                                ` : ''}
                            </div>`;
                    });
                    section += `</div></div>`;
                    view.innerHTML += section;
                }
            });
            showLoading(false);
        }

        async function saveProduct() {
            showLoading(true);
            const id = document.getElementById('edit-id').value;
            const item = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                image_url: document.getElementById('p-img').value,
                category: document.getElementById('p-cat').value
            };
            let error;
            if (id) ({ error } = await supabaseClient.from('products').update(item).eq('id', id));
            else ({ error } = await supabaseClient.from('products').insert([item]));
            showLoading(false);
            if (error) alert(error.message); else { resetAdminForm(); toggleModal('admin-modal', false); loadProducts(); }
        }

        function editProduct(id, name, price, img, cat) {
            document.getElementById('edit-id').value = id;
            document.getElementById('p-name').value = name;
            document.getElementById('p-price').value = price;
            document.getElementById('p-img').value = img;
            document.getElementById('p-cat').value = cat;
            document.getElementById('admin-title').innerText = "Editando Item";
            toggleModal('admin-modal', true);
        }

        function resetAdminForm() {
            document.getElementById('edit-id').value = '';
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-img').value = '';
            document.getElementById('admin-title').innerText = "Novo Item";
        }

        async function deleteProduct(id) {
            if(confirm("Excluir item?")) { 
                showLoading(true);
                await supabaseClient.from('products').delete().eq('id', id); 
                loadProducts(); 
            }
        }

        function addToCart(name, price) {
            const item = cart.find(i => i.name === name);
            if (item) item.qty++; else cart.push({ name, price, qty: 1 });
            updateCart();
        }

        function removeFromCart(name, all = false) {
            const idx = cart.findIndex(i => i.name === name);
            if (idx !== -1) {
                if (all || cart[idx].qty <= 1) cart.splice(idx, 1);
                else cart[idx].qty--;
            }
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;
            cart.forEach(i => {
                total += i.price * i.qty;
                container.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid #333; font-size:0.8em;">
                        <span>${i.qty}x ${i.name}</span>
                        <div>
                            <button style="width:auto; padding:2px 6px" onclick="removeFromCart('${i.name}')">-</button>
                            <button style="width:auto; padding:2px 6px" class="btn-del" onclick="removeFromCart('${i.name}', true)">x</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = `Total: $${total}`;
        }

        async function checkout() {
            if (cart.length === 0) return alert("Vazio!");
            showLoading(true);
            const list = cart.map(i => `• ${i.qty}x ${i.name} ($${i.price * i.qty})`).join('\n');
            const total = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
            try {
                await fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: "🚨 NOVO PEDIDO", color: 16711680,
                            fields: [
                                { name: "👤 Cliente", value: currentUser.user_metadata.nome_ingame, inline: true },
                                { name: "📞 Telefone", value: currentUser.user_metadata.tel_ingame, inline: true },
                                { name: "📦 Itens", value: list },
                                { name: "💰 Total", value: `**$${total}**` }
                            ],
                            timestamp: new Date()
                        }]
                    })
                });
                alert("Enviado!"); cart = []; updateCart();
            } catch(e) { alert("Erro ao enviar."); }
            showLoading(false);
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
